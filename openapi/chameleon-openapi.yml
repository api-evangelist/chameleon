openapi: 3.1.0
info:
  title: Chameleon REST API
  version: "3"
  description: |
    Chameleon server-side REST API for managing in-app product Experiences:
    user profiles, companies, segments, tours, microsurveys, launchers,
    tooltips, webhooks, themes, deliveries, and analytics. Authenticates
    with the X-Account-Secret header containing your account secret.
  contact:
    name: Chameleon Developer Portal
    url: https://developers.chameleon.io/
servers:
  - url: https://api.chameleon.io/v3
security:
  - accountSecret: []
tags:
  - name: Profiles
  - name: Companies
  - name: Segments
  - name: Tours
  - name: Interactions
  - name: Microsurveys
  - name: Responses
  - name: Deliveries
  - name: Limit Groups
  - name: Alert Groups
  - name: Launchers
  - name: Tooltips
  - name: Webhooks
  - name: Domains
  - name: Tags
  - name: Properties
  - name: Imports
paths:
  /analyze/profiles:
    get:
      tags: [Profiles]
      summary: List user profiles
      operationId: listProfiles
      responses:
        "200":
          description: List
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListEnvelope" }
  /analyze/profiles/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [Profiles]
      summary: Retrieve a user profile
      operationId: getProfile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { type: object }
