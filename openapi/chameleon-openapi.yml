components:
  securitySchemes:
    accountSecret:
      type: apiKey
      in: header
      name: X-Account-Secret
      description: Your Chameleon account secret. See https://developers.chameleon.io/api-introduction/authentication
  schemas:
    ListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { type: object }
        next: { type: string, nullable: true }
